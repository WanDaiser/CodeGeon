services:
  sandbox:
    build:
      context: ./sandbox
    image: codequest-python-sandbox:latest
    command: python --version

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000

  backend:
    image: python:3.11-slim
    working_dir: /app
    command: sh -c "pip install -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      DATABASE_URL: postgresql+psycopg://codequest:codequest@postgres:5432/codequest
      REDIS_URL: redis://redis:6379/0
    depends_on:
      sandbox:
        condition: service_completed_successfully
      postgres:
        condition: service_started
      redis:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: codequest
      POSTGRES_USER: codequest
      POSTGRES_PASSWORD: codequest
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
